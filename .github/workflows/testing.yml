name: Tests

# Manual-only while pyTelops depends on the private pyGigEVision repo via
# git+ssh. Automated CI on a private dependency needs deploy keys or PAT
# secrets. Re-enable the push/pull_request triggers when pyGigEVision is on
# PyPI and the dependency pin is switched (the coordinated public release).
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "${{ matrix.python-version }}"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint (ruff check)
        run: ruff check pyTelops tests
      - name: Lint (ruff format check)
        run: ruff format --check pyTelops tests
      - name: Run tests
        run: pytest -v
