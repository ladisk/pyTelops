name: Publish to PyPI

# Manual-only — pyTelops stays private until the Telops collaboration
# terms are locked in. When ready to publish publicly, the dependency
# pin in pyproject.toml needs to switch from `git+ssh://...@v0.1.0` to
# a PyPI version of pyGigEVision (also currently private). Then this
# workflow can be re-armed for tag pushes.
on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.13.0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
